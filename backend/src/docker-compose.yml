version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: trisecmed-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trisecmeddb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  trisecmed-api:
    build:
      context: .
      dockerfile: Trisecmed.API/Dockerfile
    container_name: trisecmed-api
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=trisecmeddb;Username=postgres;Password=postgres"
    ports:
      - "5008:80"

volumes:
  pgdata: