version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: trisecmed_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trisecmed_net

  backend:
    build:
      context: ./backend
    container_name: trisecmed_api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=trisecmed
    depends_on:
      - db
    networks:
      - trisecmed_net

  frontend:
    build:
      context: ./frontend
    container_name: trisecmed_frontend
    networks:
      - trisecmed_net

  nginx:
    image: nginx:alpine
    container_name: trisecmed_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - trisecmed_net

volumes:
  postgres_data:

networks:
  trisecmed_net: