services:
  db:
    image: postgres:16-alpine
    container_name: trisecmed_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - trisecmed_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: trisecmed_api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=trisecmed
      - Jwt__Audience=trisecmed-client
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    networks:
      - trisecmed_net

  nginx:
    image: nginx:alpine
    container_name: trisecmed_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - trisecmed_net

volumes:
  postgres_data:
  api_logs:

networks:
  trisecmed_net:
